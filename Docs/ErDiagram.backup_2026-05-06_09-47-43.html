<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Диаграммы проекта</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --panel-soft: #f7f9fb;
            --ink: #111111;
            --muted: #5f6670;
            --line: #1f1f1f;
            --grid: #dfe5eb;
            --head: #d9eaf7;
            --head-2: #bfe1fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            background: var(--bg);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .app {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        aside {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
            padding: 22px;
            border-right: 1px solid #cfd7df;
            background: var(--panel);
        }

        main {
            min-width: 0;
            background: #eef2f5;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.35;
        }

        .tabs {
            display: grid;
            gap: 8px;
            margin-top: 18px;
        }

        .tab {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #c7d0d9;
            border-radius: 4px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            text-align: left;
        }

        .tab:hover {
            background: #f4f8fb;
            border-color: #8fb5d2;
        }

        .tab.active {
            border-color: #6f9fbd;
            background: #e9f4fc;
            box-shadow: inset 3px 0 0 #6f9fbd;
        }

        .tab small {
            color: var(--muted);
            font-size: 12px;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            padding: 18px 22px 14px;
            border-bottom: 1px solid #cfd7df;
            background: var(--panel);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .actions button {
            min-width: 38px;
            padding: 8px 11px;
            border: 1px solid #c0c8d0;
            border-radius: 4px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            font: inherit;
        }

        .actions button:hover {
            background: #edf5fb;
            border-color: #7ca9c9;
        }

        #viewport {
            position: relative;
            height: calc(100vh - 78px);
            min-height: 620px;
            overflow: auto;
            background-color: #fafafa;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        #stage {
            position: relative;
            width: 10000px;
            height: 10000px;
            min-width: 100%;
            min-height: 100%;
        }

        svg {
            position: absolute;
            overflow: visible;
            background: #ffffff;
            box-shadow: 0 0 0 1px #c9d1d9, 0 10px 28px rgba(15, 23, 42, 0.12);
            transform-origin: top left;
            user-select: none;
        }

        .group-frame {
            fill: #ffffff;
            stroke: #222222;
            stroke-width: 1.5;
            stroke-dasharray: 8 6;
        }

        .group-title {
            font-size: 18px;
            font-weight: 700;
            fill: #111111;
        }

        .entity-frame,
        .block-frame,
        .diamond-frame {
            stroke: #111111;
            stroke-width: 1.8;
        }

        .entity-header {
            fill: var(--head);
            stroke: #111111;
            stroke-width: 1.6;
        }

        .entity-title {
            font-size: 18px;
            font-weight: 700;
            fill: #111111;
        }

        .entity-field {
            font-size: 15px;
            fill: #111111;
        }

        .block-frame {
            fill: url(#blockGradient);
        }

        .block-text,
        .diamond-text {
            font-size: 16px;
            font-weight: 600;
            fill: #111111;
        }

        .edge {
            fill: none;
            stroke: #111111;
            stroke-width: 1.8;
            stroke-linejoin: round;
            stroke-linecap: square;
        }

        .edge-label-bg {
            fill: #ffffff;
            stroke: none;
        }

        .edge-label,
        .cardinality {
            font-size: 14px;
            fill: #111111;
        }

        .cardinality {
            font-size: 17px;
        }

        .node,
        .edge-hit {
            cursor: default;
        }

        .node.draggable {
            cursor: move;
        }

        .status {
            position: fixed;
            right: 16px;
            bottom: 16px;
            display: none;
            padding: 10px 12px;
            border-radius: 4px;
            background: #111111;
            color: #ffffff;
            font-size: 13px;
        }

        .status.show {
            display: block;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }

            aside {
                position: static;
                height: auto;
                border-right: 0;
                border-bottom: 1px solid #cfd7df;
            }

            #viewport {
                height: 70vh;
            }
        }
    </style>
</head>

<div class="app">
    <aside>
        <h1>Диаграммы проекта</h1>
        <p>Схемы для раздела проектирования. Блоки можно двигать, результат можно сохранить в SVG или PNG.</p>
        <div class="tabs" id="tabs"></div>
    </aside>
    <main>
        <div class="topbar">
            <div>
                <h2 id="title"></h2>
                <p id="meta"></p>
            </div>
            <div class="actions">
                <button type="button" data-action="zoom-out" title="Уменьшить">-</button>
                <button type="button" data-action="zoom-reset" title="Масштаб 100%">100%</button>
                <button type="button" data-action="zoom-in" title="Увеличить">+</button>
                <button type="button" data-action="fit" title="Вписать в экран">Вписать</button>
                <button type="button" data-action="open-svg" title="Открыть SVG">Открыть</button>
                <button type="button" data-action="download-svg" title="Скачать SVG">SVG</button>
                <button type="button" data-action="download-png" title="Скачать PNG">PNG</button>
            </div>
        </div>
        <div id="viewport"><div id="stage"></div></div>
    </main>

                { from: "ПодбираемыйОбъект", to: "Аптечка", label: "может быть", start: "1", end: "1", fromSide: "right", toSide: "left", fromOffset: 45 },

                { from: "Комната", to: "ТорговыйАвтомат", label: "может содержать", start: "1", end: "1", fromSide: "bottom", toSide: "top", via: [[685, 670], [685, 1110], [1045, 1110]] },
                { from: "ТорговыйАвтомат", to: "ПредложениеМагазина", label: "показывает", start: "1", end: "M" },
                { from: "Улучшение", to: "ПредложениеМагазина", label: "продается", start: "1", end: "M", fromSide: "right", toSide: "left", via: [[820, 1248], [1240, 1248]] },
                { from: "ПредложениеМагазина", to: "Покупка", label: "выбирается", start: "1", end: "M" },
                { from: "Забег", to: "Покупка", label: "включает", start: "1", end: "M", fromSide: "bottom", toSide: "top", via: [[190, 1120], [1925, 1120]] },
                { from: "Улучшение", to: "МодификаторИгрока", label: "создает", start: "1", end: "M", fromSide: "left", toSide: "right" },
                { from: "Игрок", to: "МодификаторИгрока", label: "получает", start: "1", end: "M", fromSide: "left", toSide: "left", via: [[30, 1345]] }
            ]

    const tabs = document.getElementById("tabs");
    const title = document.getElementById("title");
    const meta = document.getElementById("meta");
    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");
    const status = document.getElementById("status");
    const canvasSize = 10000;
    let activeName = "Архитектура меню";
    let scale = 1;
    let draggedNode = null;
    let dragNodeOffsetX = 0;
    let dragNodeOffsetY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartLeft = 0;
    let panStartTop = 0;
    let statusTimer = 0;

    function xml(text) {
        return String(text ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;");
    }

    function showStatus(text) {
        window.clearTimeout(statusTimer);
        status.textContent = text;
        status.classList.add("show");
        statusTimer = window.setTimeout(() => status.classList.remove("show"), 1800);
    }

    function textLines(node) {
        if (Array.isArray(node.lines)) {
            return node.lines;
        }
        return String(node.title || node.id).split("\n");
    }

    function normalizedNode(node) {
        const copy = { ...node };
        if (copy.kind === "entity") {
            copy.h = copy.h || 43 + copy.fields.length * 22 + 16;
        }
        if (copy.kind === "block") {
            copy.h = copy.h || 58;
        }
        if (copy.kind === "decision") {
            copy.w = copy.w || 96;
            copy.h = copy.h || 96;
        }
        return copy;
    }

    function nodeCenter(node) {
        if (node.kind === "start" || node.kind === "end") {
            return { x: node.x, y: node.y };
        }
        return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
    }

    function sideByPosition(from, to, isSource) {
        const a = nodeCenter(from);
        const b = nodeCenter(to);
        if (Math.abs(b.x - a.x) >= Math.abs(b.y - a.y)) {
            if (isSource) {
                return b.x >= a.x ? "right" : "left";
            }
            return b.x >= a.x ? "left" : "right";
        }
        if (isSource) {
            return b.y >= a.y ? "bottom" : "top";
        }
        return b.y >= a.y ? "top" : "bottom";
    }

    function port(node, side, offset = 0) {
        if (node.kind === "start" || node.kind === "end") {
            const radius = node.r || 12;
            if (side === "left") {
                return { x: node.x - radius, y: node.y + offset };
            }
            if (side === "right") {
                return { x: node.x + radius, y: node.y + offset };
            }
            if (side === "top") {
                return { x: node.x + offset, y: node.y - radius };
            }
            return { x: node.x + offset, y: node.y + radius };
        }

        const centerX = node.x + node.w / 2;
        const centerY = node.y + node.h / 2;
        if (side === "left") {
            return { x: node.x, y: centerY + offset };
        }
        if (side === "right") {
            return { x: node.x + node.w, y: centerY + offset };
        }
        if (side === "top") {
            return { x: centerX + offset, y: node.y };
        }
        return { x: centerX + offset, y: node.y + node.h };
    }

    function routeEdge(edge, nodesById) {
        const from = nodesById.get(edge.from);
        const to = nodesById.get(edge.to);
        const fromSide = edge.fromSide || sideByPosition(from, to, true);
        const toSide = edge.toSide || sideByPosition(from, to, false);
        const start = port(from, fromSide, edge.fromOffset || 0);
        const end = port(to, toSide, edge.toOffset || 0);
        const points = [start];

        if (Array.isArray(edge.via)) {
            for (const point of edge.via) {
                points.push({ x: point[0], y: point[1] });
            }
        } else if (fromSide === "left" || fromSide === "right") {
            const midX = (start.x + end.x) / 2;
            points.push({ x: midX, y: start.y });
            points.push({ x: midX, y: end.y });
        } else {
            const midY = (start.y + end.y) / 2;
            points.push({ x: start.x, y: midY });
            points.push({ x: end.x, y: midY });
        }

        points.push(end);
        return points;
    }

    function polyline(points) {
        return points.map(point => `${point.x},${point.y}`).join(" ");
    }

    function pathMidpoint(points) {
        let length = 0;
        const segments = [];
        for (let index = 0; index < points.length - 1; index++) {
            const a = points[index];
            const b = points[index + 1];
            const distance = Math.hypot(b.x - a.x, b.y - a.y);
            segments.push({ a, b, distance });
            length += distance;
        }
        let target = length / 2;
        for (const segment of segments) {
            if (target <= segment.distance) {
                const ratio = segment.distance === 0 ? 0 : target / segment.distance;
                return {
                    x: segment.a.x + (segment.b.x - segment.a.x) * ratio,
                    y: segment.a.y + (segment.b.y - segment.a.y) * ratio
                };
            }
            target -= segment.distance;
        }
        return points[Math.floor(points.length / 2)];
    }

    function labelBox(text, x, y, className) {
        if (text == null || text === "") {
            return "";
        }
        const width = Math.max(26, String(text).length * 7.2 + 14);
        return `<rect class="edge-label-bg" x="${x - width / 2}" y="${y - 16}" width="${width}" height="20"/>` +
            `<text class="${className}" x="${x}" y="${y}" text-anchor="middle">${xml(text)}</text>`;
    }

    function cardinality(text, point, next, dx = 0, dy = 0) {
        if (text == null || text === "") {
            return "";
        }
        const vectorX = next.x - point.x;
        const vectorY = next.y - point.y;
        const length = Math.max(1, Math.hypot(vectorX, vectorY));
        const x = point.x + (vectorX / length) * 24 + dx;
        const y = point.y + (vectorY / length) * 24 + 6 + dy;
        return labelBox(text, x, y, "cardinality");
    }

    function renderGroup(node) {
        return `<g class="group" data-node="${xml(node.id)}" data-x="${node.x}" data-y="${node.y}" data-width="${node.w}" data-height="${node.h}" transform="translate(${node.x},${node.y})">` +
            `<rect class="group-frame" x="0" y="0" width="${node.w}" height="${node.h}" rx="10"/>` +
            `<text class="group-title" x="${node.w / 2}" y="34" text-anchor="middle">${xml(node.title)}</text>` +
            `</g>`;
    }

    function renderEntity(node) {
        let result = `<g class="node draggable" data-node="${xml(node.id)}" data-x="${node.x}" data-y="${node.y}" data-width="${node.w}" data-height="${node.h}" transform="translate(${node.x},${node.y})">`;
        result += `<rect class="entity-frame" x="0" y="0" width="${node.w}" height="${node.h}" fill="#ffffff"/>`;
        result += `<rect class="entity-header" x="0" y="0" width="${node.w}" height="38"/>`;
        result += `<text class="entity-title" x="${node.w / 2}" y="25" text-anchor="middle">${xml(node.id)}</text>`;
        for (let index = 0; index < node.fields.length; index++) {
            result += `<text class="entity-field" x="14" y="${62 + index * 22}">${xml(node.fields[index])}</text>`;
        }
        result += `</g>`;
        return result;
    }

    function renderBlock(node) {
        const lines = textLines(node);
        let result = `<g class="node draggable" data-node="${xml(node.id)}" data-x="${node.x}" data-y="${node.y}" data-width="${node.w}" data-height="${node.h}" transform="translate(${node.x},${node.y})">`;
        result += `<rect class="block-frame" x="0" y="0" width="${node.w}" height="${node.h}" rx="10"/>`;
        const baseY = node.h / 2 - (lines.length - 1) * 10 + 6;
        for (let index = 0; index < lines.length; index++) {
            result += `<text class="block-text" x="${node.w / 2}" y="${baseY + index * 20}" text-anchor="middle">${xml(lines[index])}</text>`;
        }
        result += `</g>`;
        return result;
    }

    function renderDecision(node) {
        const lines = textLines(node);
        const halfW = node.w / 2;
        const halfH = node.h / 2;
        let result = `<g class="node draggable" data-node="${xml(node.id)}" data-x="${node.x}" data-y="${node.y}" data-width="${node.w}" data-height="${node.h}" transform="translate(${node.x},${node.y})">`;
        result += `<polygon class="diamond-frame" points="${halfW},0 ${node.w},${halfH} ${halfW},${node.h} 0,${halfH}" fill="url(#blockGradient)"/>`;
        const baseY = halfH - (lines.length - 1) * 9 + 5;
        for (let index = 0; index < lines.length; index++) {
            result += `<text class="diamond-text" x="${halfW}" y="${baseY + index * 18}" text-anchor="middle">${xml(lines[index])}</text>`;
        }
        result += `</g>`;
        return result;
    }

    function renderCircle(node) {
        const radius = node.r || 12;
        const isEnd = node.kind === "end";
        let result = `<g class="node" data-node="${xml(node.id)}" data-x="${node.x - radius}" data-y="${node.y - radius}" data-width="${radius * 2}" data-height="${radius * 2}">`;
        result += `<circle cx="${node.x}" cy="${node.y}" r="${radius}" fill="#000000" stroke="#000000" stroke-width="1.5"/>`;
        if (isEnd) {
            result += `<circle cx="${node.x}" cy="${node.y}" r="${radius + 6}" fill="none" stroke="#000000" stroke-width="2"/>`;
        }
        result += `</g>`;
        return result;
    }

    function renderNode(node) {
        if (node.kind === "entity") {
            return renderEntity(node);
        }
        if (node.kind === "decision") {
            return renderDecision(node);
        }
        if (node.kind === "start" || node.kind === "end") {
            return renderCircle(node);
        }
        return renderBlock(node);
    }

    function renderDiagram(name) {
        const diagram = diagrams[name];
        const nodes = diagram.nodes.map(node => normalizedNode(node));
        const nodesById = new Map(nodes.map(node => [node.id, node]));
        let svg = `<svg id="canvas" xmlns="http://www.w3.org/2000/svg" width="${diagram.width}" height="${diagram.height}" viewBox="0 0 ${diagram.width} ${diagram.height}" font-family="Segoe UI, Arial, sans-serif">`;
        svg += `<defs><linearGradient id="blockGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d7efff"/><stop offset="1" stop-color="#9ed0f5"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111111"/></marker></defs>`;

        for (const node of nodes.filter(item => item.kind === "group")) {
            svg += renderGroup(node);
        }

        for (let index = 0; index < diagram.edges.length; index++) {
            const edge = diagram.edges[index];
            const points = routeEdge(edge, nodesById);
            const marker = edge.arrow === true ? ` marker-end="url(#arrow)"` : "";
            svg += `<polyline class="edge" data-edge-id="${index}" data-from="${xml(edge.from)}" data-to="${xml(edge.to)}" points="${polyline(points)}"${marker}/>`;
            const labelPoint = edge.labelX != null && edge.labelY != null ? { x: edge.labelX, y: edge.labelY } : pathMidpoint(points);
            svg += labelBox(edge.label, labelPoint.x, labelPoint.y - 6, "edge-label");
            svg += cardinality(edge.start, points[0], points[1], edge.startDx || 0, edge.startDy || 0);
            svg += cardinality(edge.end, points[points.length - 1], points[points.length - 2], edge.endDx || 0, edge.endDy || 0);
        }

        for (const node of nodes.filter(item => item.kind !== "group")) {
            svg += renderNode(node);
        }

        svg += `</svg>`;
        return svg;
    }

    function getSvg() {
        return document.getElementById("canvas");
    }

    function setActiveTab(name) {
        for (const tab of tabs.querySelectorAll(".tab")) {
            tab.classList.toggle("active", tab.dataset.name === name);
        }
    }

    function showDiagram(name) {
        activeName = name;
        const diagram = diagrams[name];
        title.textContent = name;
        meta.textContent = `${diagram.description} Блоков: ${diagram.nodes.length}, связей: ${diagram.edges.length}.`;
        stage.innerHTML = renderDiagram(name);
        setActiveTab(name);
        centerCanvasInStage();
        fitToScreen();
        attachNodeHandlers();
    }

    function centerCanvasInStage() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }
        const left = Math.max(0, (canvasSize - svg.viewBox.baseVal.width) / 2);
        const top = Math.max(0, (canvasSize - svg.viewBox.baseVal.height) / 2);
        svg.style.left = `${left}px`;
        svg.style.top = `${top}px`;
    }

    function setScale(nextScale) {
        const svg = getSvg();
        if (svg == null) {
            return;
        }
        scale = Math.max(0.25, Math.min(4, nextScale));
        svg.style.transform = `scale(${scale})`;
    }

    function fitToScreen() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }
        const availableWidth = Math.max(1, viewport.clientWidth - 80);
        const availableHeight = Math.max(1, viewport.clientHeight - 80);
        const widthScale = availableWidth / svg.viewBox.baseVal.width;
        const heightScale = availableHeight / svg.viewBox.baseVal.height;
        setScale(Math.min(1, widthScale, heightScale));
        const left = parseFloat(svg.style.left) || 0;
        const top = parseFloat(svg.style.top) || 0;
        viewport.scrollLeft = Math.max(0, left + svg.viewBox.baseVal.width * scale / 2 - viewport.clientWidth / 2);
        viewport.scrollTop = Math.max(0, top + svg.viewBox.baseVal.height * scale / 2 - viewport.clientHeight / 2);
    }

    function serializeSvg(svg) {
        const clone = svg.cloneNode(true);
        clone.removeAttribute("style");
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        return `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
    }

    function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    async function svgToPngBlob(svg) {
        const serialized = serializeSvg(svg);
        const url = URL.createObjectURL(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" }));
        const image = new Image();
        const box = svg.viewBox.baseVal;
        image.src = url;
        await image.decode();
        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(box.width * 2);
        canvas.height = Math.ceil(box.height * 2);
        const context = canvas.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        return await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    function nodeBounds(nodeElement) {
        return {
            x: parseFloat(nodeElement.dataset.x),
            y: parseFloat(nodeElement.dataset.y),
            w: parseFloat(nodeElement.dataset.width),
            h: parseFloat(nodeElement.dataset.height)
        };
    }

    function svgPoint(clientX, clientY) {
        const svg = getSvg();
        const point = svg.createSVGPoint();
        point.x = clientX;
        point.y = clientY;
        return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function attachNodeHandlers() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }
        for (const node of svg.querySelectorAll(".node.draggable")) {
            node.addEventListener("pointerdown", event => {
                const point = svgPoint(event.clientX, event.clientY);
                const bounds = nodeBounds(node);
                draggedNode = node;
                dragNodeOffsetX = point.x - bounds.x;
                dragNodeOffsetY = point.y - bounds.y;
                node.setPointerCapture(event.pointerId);
            });
        }
    }

    function updateNodePosition(nodeElement, x, y) {
        nodeElement.dataset.x = x;
        nodeElement.dataset.y = y;
        nodeElement.setAttribute("transform", `translate(${x},${y})`);
    }

    tabs.innerHTML = Object.keys(diagrams).map(name => {
        const diagram = diagrams[name];
        return `<button class="tab" type="button" data-name="${xml(name)}"><span>${xml(name)}</span><small>${diagram.nodes.length}/${diagram.edges.length}</small></button>`;
    }).join("");

    tabs.addEventListener("click", event => {
        const tab = event.target.closest(".tab");
        if (tab != null) {
            showDiagram(tab.dataset.name);
        }
    });

    document.addEventListener("pointermove", event => {
        if (draggedNode != null) {
            const point = svgPoint(event.clientX, event.clientY);
            updateNodePosition(draggedNode, Math.round(point.x - dragNodeOffsetX), Math.round(point.y - dragNodeOffsetY));
        }
        if (isPanning) {
            viewport.scrollLeft = panStartLeft - (event.clientX - panStartX);
            viewport.scrollTop = panStartTop - (event.clientY - panStartY);
        }
    });

    document.addEventListener("pointerup", () => {
        draggedNode = null;
        isPanning = false;
    });

    viewport.addEventListener("pointerdown", event => {
        if (event.target === viewport || event.target === stage) {
            isPanning = true;
            panStartX = event.clientX;
            panStartY = event.clientY;
            panStartLeft = viewport.scrollLeft;
            panStartTop = viewport.scrollTop;
        }
    });

    viewport.addEventListener("wheel", event => {
        if (event.ctrlKey === false) {
            return;
        }
        event.preventDefault();
        setScale(scale + (event.deltaY < 0 ? 0.12 : -0.12));
    }, { passive: false });

    document.querySelector(".actions").addEventListener("click", async event => {
        const button = event.target.closest("button[data-action]");
        if (button == null) {
            return;
        }
        const action = button.dataset.action;
        const svg = getSvg();
        if (svg == null) {
            return;
        }
        if (action === "zoom-out") {
            setScale(scale - 0.12);
            return;
        }
        if (action === "zoom-reset") {
            setScale(1);
            return;
        }
        if (action === "zoom-in") {
            setScale(scale + 0.12);
            return;
        }
        if (action === "fit") {
            fitToScreen();
            return;
        }
        const serialized = serializeSvg(svg);
        const fileName = activeName.replace(/[^А-Яа-яA-Za-z0-9_]+/g, "_");
        if (action === "open-svg") {
            window.open(URL.createObjectURL(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" })), "_blank");
            return;
        }
        if (action === "download-svg") {
            downloadBlob(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" }), `${fileName}.svg`);
            showStatus("SVG сохранен");
            return;
        }
        if (action === "download-png") {
            downloadBlob(await svgToPngBlob(svg), `${fileName}.png`);
            showStatus("PNG сохранен");
        }
    });

    showDiagram(activeName);
</script>
</body>
</html>
