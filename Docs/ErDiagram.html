<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Architecture Diagrams</title>
    <style>
        :root {
            --bg: #0d1110;
            --sidebar: #18231f;
            --main: #101714;
            --ink: #eef4e8;
            --muted: #a9b7ac;
            --line: #2b3934;
            --accent: #f59e0b;
            --blue: #6c8ebf;
            --green: #82b366;
            --yellow: #d6b656;
            --purple: #9673a6;
            --red: #b85450;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            background: var(--bg);
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        }

        .app {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        aside {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
            padding: 22px;
            border-right: 1px solid var(--line);
            background: linear-gradient(180deg, var(--sidebar), #111816 80%);
        }

        main {
            min-width: 0;
            background: linear-gradient(180deg, #131b18, var(--main) 78%);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0;
        }

        h2 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.35;
        }

        .tabs {
            display: grid;
            gap: 8px;
            margin-top: 18px;
        }

        .tab {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(26, 36, 32, 0.84);
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            text-align: left;
        }

        .tab:hover {
            border-color: #577166;
            background: rgba(33, 46, 41, 0.94);
        }

        .tab.active {
            border-color: var(--accent);
            background: rgba(72, 58, 29, 0.72);
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .tab small {
            color: var(--muted);
            font-size: 12px;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            padding: 22px 22px 14px;
            border-bottom: 1px solid #1f2a26;
            background: rgba(19, 27, 24, 0.88);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .actions button {
            min-width: 38px;
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #1d2824;
            color: var(--ink);
            cursor: pointer;
            font: inherit;
        }

        .actions button:hover {
            border-color: #6f8b7d;
            background: #26352f;
        }

        .actions button.active {
            border-color: var(--accent);
            background: #3a2c18;
            color: #ffe4b8;
        }

        #viewport {
            position: relative;
            overflow: auto;
            min-height: calc(100vh - 118px);
            max-height: calc(100vh - 118px);
            background:
                linear-gradient(rgba(35, 45, 40, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(35, 45, 40, 0.06) 1px, transparent 1px),
                #fffdf7;
            background-size: 24px 24px;
            cursor: grab;
            user-select: none;
        }

        #viewport.dragging {
            cursor: grabbing;
        }

        #stage {
            position: relative;
            width: 10000px;
            height: 10000px;
            min-width: 100%;
            min-height: 100%;
        }

        #canvas {
            display: block;
            position: absolute;
            left: 0;
            top: 0;
            overflow: visible;
            transform-origin: top left;
            filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.18));
        }

        .node {
            cursor: move;
        }

        .node-title {
            font-size: 16px;
            font-weight: 700;
            fill: #111827;
        }

        .node-detail {
            font-size: 12px;
            fill: #374151;
        }

        .edge {
            fill: none;
            stroke: #4b5563;
            stroke-width: 1.7;
            opacity: 0.78;
            cursor: pointer;
        }

        .edge-label {
            font-size: 12px;
            font-weight: 600;
            fill: #111827;
            pointer-events: none;
        }

        .edge-label-bg {
            fill: #ffffff;
            stroke: #d1d5db;
            pointer-events: none;
        }

        .edge-active {
            opacity: 1;
            stroke-width: 3px;
        }

        .edge-handle {
            cursor: grab;
            fill: #ffffff;
            stroke: #111827;
            stroke-width: 1.5;
            opacity: 0.78;
        }

        .edge-handle:hover,
        .edge-handle-active {
            cursor: grabbing;
            fill: var(--accent);
            opacity: 1;
        }

        .focused .node-frame,
        .dragging-node .node-frame {
            stroke: var(--accent);
            stroke-width: 2.5px;
        }

        .dimmed {
            opacity: 0.18;
        }

        .focus-hidden {
            display: none;
        }

        .status {
            position: fixed;
            right: 24px;
            bottom: 24px;
            max-width: 460px;
            padding: 12px 14px;
            background: #e9f3e8;
            color: #111815;
            border-radius: 6px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 140ms ease, transform 140ms ease;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }

        .status.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }

            aside {
                position: static;
                height: auto;
                max-height: 42vh;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            #viewport {
                min-height: 60vh;
                max-height: none;
            }
        }
    </style>
</head>

    let scale = 1;
    let statusTimer = 0;
    let draggedNode = null;
    let draggedEdge = null;
    let dragNodeOffsetX = 0;
    let dragNodeOffsetY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartLeft = 0;
    let panStartTop = 0;

    function xml(text) {
        return String(text).replace(/[&<>"']/g, char => {
            if (char === "&") { return "&amp;"; }
            if (char === "<") { return "&lt;"; }
            if (char === ">") { return "&gt;"; }
            if (char === "\"") { return "&quot;"; }
            return "&#39;";
        });
    }

    function showStatus(text) {
        status.textContent = text;
        status.classList.add("visible");
        clearTimeout(statusTimer);
        statusTimer = setTimeout(() => status.classList.remove("visible"), 1800);
    }

    function edgeSide(from, to, isSource) {
        const fromCenterX = from.x + from.w / 2;
        const fromCenterY = from.y + from.h / 2;
        const toCenterX = to.x + to.w / 2;
        const toCenterY = to.y + to.h / 2;
        const horizontal = Math.abs(toCenterX - fromCenterX) >= Math.abs(toCenterY - fromCenterY);

        if (horizontal) {
            const sourceSide = toCenterX >= fromCenterX ? "right" : "left";
            const targetSide = sourceSide === "right" ? "left" : "right";
            return isSource ? sourceSide : targetSide;
        }

        const sourceSide = toCenterY >= fromCenterY ? "bottom" : "top";
        const targetSide = sourceSide === "bottom" ? "top" : "bottom";
        return isSource ? sourceSide : targetSide;
    }

    function portPoint(node, side, offset) {
        const centerX = node.x + node.w / 2;
        const centerY = node.y + node.h / 2;
        const horizontalLimit = Math.max(0, node.w / 2 - 18);
        const verticalLimit = Math.max(0, node.h / 2 - 18);

        if (side === "left") {
            return { x: node.x, y: centerY + Math.max(-verticalLimit, Math.min(verticalLimit, offset)) };
        }
        if (side === "right") {
            return { x: node.x + node.w, y: centerY + Math.max(-verticalLimit, Math.min(verticalLimit, offset)) };
        }
        if (side === "top") {
            return { x: centerX + Math.max(-horizontalLimit, Math.min(horizontalLimit, offset)), y: node.y };
        }
        return { x: centerX + Math.max(-horizontalLimit, Math.min(horizontalLimit, offset)), y: node.y + node.h };
    }

    function edgeCenter(from, to, lane, fromOffset, toOffset) {
        const fromSide = edgeSide(from, to, true);
        const toSide = edgeSide(from, to, false);
        const fromPoint = portPoint(from, fromSide, fromOffset);
        const toPoint = portPoint(to, toSide, toOffset);
        const horizontal = fromSide === "left" || fromSide === "right";

        if (horizontal) {
            const midX = (fromPoint.x + toPoint.x) / 2 + lane;
            return {
                path: `M${fromPoint.x} ${fromPoint.y} L${midX} ${fromPoint.y} L${midX} ${toPoint.y} L${toPoint.x} ${toPoint.y}`,
                labelX: midX,
                labelY: (fromPoint.y + toPoint.y) / 2
            };
        }

        const midY = (fromPoint.y + toPoint.y) / 2 + lane;
        return {
            path: `M${fromPoint.x} ${fromPoint.y} L${fromPoint.x} ${midY} L${toPoint.x} ${midY} L${toPoint.x} ${toPoint.y}`,
            labelX: (fromPoint.x + toPoint.x) / 2,
            labelY: midY
        };
    }

    function detailLines(node) {
        return node.detail.split(", ");
    }

    function nodeHeight(node) {
        return Math.max(node.h, 46 + detailLines(node).length * 18);
    }

    function normalizedNode(node) {
        return {
            ...node,
            h: nodeHeight(node)
        };
    }

    function edgeLane(index) {
        return ((index % 9) - 4) * 14;
    }

    function edgeStroke(index) {
        return edgeColors[index % edgeColors.length];
    }

    function edgePortOffsets(edges, nodesById) {
        const endpointGroups = new Map();
        const endpoints = edges.map(edge => {
            const from = nodesById.get(edge[0]);
            const to = nodesById.get(edge[1]);
            const fromSide = edgeSide(from, to, true);
            const toSide = edgeSide(from, to, false);
            const fromKey = edge[0] + "|" + fromSide;
            const toKey = edge[1] + "|" + toSide;
            return { fromKey, toKey };
        });

        for (let index = 0; index < endpoints.length; index++) {
            const endpoint = endpoints[index];
            if (endpointGroups.has(endpoint.fromKey) === false) {
                endpointGroups.set(endpoint.fromKey, []);
            }
            if (endpointGroups.has(endpoint.toKey) === false) {
                endpointGroups.set(endpoint.toKey, []);
            }
            endpointGroups.get(endpoint.fromKey).push({ index, side: "from" });
            endpointGroups.get(endpoint.toKey).push({ index, side: "to" });
        }

        const offsets = edges.map(() => ({ fromOffset: 0, toOffset: 0 }));
        for (const group of endpointGroups.values()) {
            const step = 22;
            for (let position = 0; position < group.length; position++) {
                const offset = (position - (group.length - 1) / 2) * step;
                const item = group[position];
                if (item.side === "from") {
                    offsets[item.index].fromOffset = offset;
                } else {
                    offsets[item.index].toOffset = offset;
                }
            }
        }

        return offsets;
    }

    function renderDiagram(name) {
        const diagram = diagrams[name];
        const nodes = diagram.nodes.map(node => normalizedNode(node));
        const nodesById = new Map(nodes.map(node => [node.id, node]));
        const portOffsets = edgePortOffsets(diagram.edges, nodesById);
        let svg = `<svg id="canvas" xmlns="http://www.w3.org/2000/svg" width="${diagram.width}" height="${diagram.height}" viewBox="0 0 ${diagram.width} ${diagram.height}" font-family="Segoe UI, Trebuchet MS, sans-serif">`;
        svg += `<defs>`;
        for (let index = 0; index < edgeColors.length; index++) {
            svg += `<marker id="arrow-${index}" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="${edgeColors[index]}"/></marker>`;
        }
        svg += `</defs>`;

        for (let index = 0; index < diagram.edges.length; index++) {
            const edge = diagram.edges[index];
            const from = nodesById.get(edge[0]);
            const to = nodesById.get(edge[1]);
            const lane = edgeLane(index);
            const offsets = portOffsets[index];
            const route = edgeCenter(from, to, lane, offsets.fromOffset, offsets.toOffset);
            const labelWidth = Math.max(42, edge[2].length * 7 + 18);
            svg += `<path class="edge" data-edge-id="${index}" data-from="${xml(edge[0])}" data-to="${xml(edge[1])}" data-lane="${lane}" data-from-offset="${offsets.fromOffset}" data-to-offset="${offsets.toOffset}" d="${route.path}" fill="none" stroke="${edgeStroke(index)}" stroke-width="1.7" opacity="0.78" marker-end="url(#arrow-${index % edgeColors.length})"/>`;
            svg += `<rect class="edge-label-bg" data-edge-id="${index}" data-from="${xml(edge[0])}" data-to="${xml(edge[1])}" data-lane="${lane}" data-from-offset="${offsets.fromOffset}" data-to-offset="${offsets.toOffset}" x="${route.labelX - labelWidth / 2}" y="${route.labelY - 17}" width="${labelWidth}" height="18" rx="4" fill="#ffffff" stroke="#d1d5db"/>`;
            svg += `<text class="edge-label" data-edge-id="${index}" data-from="${xml(edge[0])}" data-to="${xml(edge[1])}" data-lane="${lane}" data-from-offset="${offsets.fromOffset}" data-to-offset="${offsets.toOffset}" x="${route.labelX}" y="${route.labelY - 4}" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">${xml(edge[2])}</text>`;
            svg += `<circle class="edge-handle" data-edge-id="${index}" data-from="${xml(edge[0])}" data-to="${xml(edge[1])}" data-lane="${lane}" data-from-offset="${offsets.fromOffset}" data-to-offset="${offsets.toOffset}" cx="${route.labelX}" cy="${route.labelY}" r="6"/>`;
        }

        for (const node of nodes) {
            const color = colors[node.color] || colors.gray;
            svg += `<g class="node" data-node="${xml(node.id)}" data-x="${node.x}" data-y="${node.y}" data-width="${node.w}" data-height="${node.h}" transform="translate(${node.x},${node.y})">`;
            svg += `<rect x="3" y="3" width="${node.w}" height="${node.h}" rx="4" fill="rgba(0,0,0,0.12)"/>`;
            svg += `<rect class="node-frame" x="0" y="0" width="${node.w}" height="${node.h}" rx="4" fill="#ffffff" stroke="${color.stroke}" stroke-width="1.4"/>`;
            svg += `<rect x="0" y="0" width="${node.w}" height="34" rx="4" fill="${color.fill}" stroke="${color.stroke}" stroke-width="1.4"/>`;
            svg += `<rect x="0" y="30" width="${node.w}" height="4" fill="${color.fill}"/>`;
            svg += `<line x1="0" y1="34" x2="${node.w}" y2="34" stroke="${color.stroke}" stroke-width="1"/>`;
            svg += `<text class="node-title" x="14" y="23" fill="#111827" font-size="16" font-weight="700">${xml(node.id)}</text>`;
            const lines = detailLines(node);
            for (let index = 0; index < lines.length; index++) {
                svg += `<text class="node-detail" x="14" y="${54 + index * 18}" fill="#374151" font-size="12">${xml(lines[index])}</text>`;
            }
            svg += `</g>`;
        }

        svg += `</svg>`;
        return svg;
    }

    function getSvg() {
        return document.getElementById("canvas");
    }

    function setActiveTab(name) {
        for (const tab of tabs.querySelectorAll(".tab")) {
            tab.classList.toggle("active", tab.dataset.name === name);
        }
    }

    function showDiagram(name) {
        activeName = name;
        const diagram = diagrams[name];
        title.textContent = name;
        meta.textContent = `${diagram.nodes.length} blocks, ${diagram.edges.length} links. Drag blocks to adjust the view.`;
        setActiveTab(name);
        scale = 1;
        stage.innerHTML = renderDiagram(name);
        centerCanvasInStage();
        setScale(1);
        centerViewportOnCanvas();
        attachNodeHandlers();
        attachEdgeHandlers();
    }

    function centerCanvasInStage() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        const left = Math.max(0, (canvasSize - svg.viewBox.baseVal.width) / 2);
        const top = Math.max(0, (canvasSize - svg.viewBox.baseVal.height) / 2);
        svg.style.left = `${left}px`;
        svg.style.top = `${top}px`;
    }

    function setScale(nextScale) {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        scale = Math.max(0.25, Math.min(4, nextScale));
        svg.style.transform = `scale(${scale})`;
        svg.style.marginRight = `${svg.viewBox.baseVal.width * (scale - 1)}px`;
        svg.style.marginBottom = `${svg.viewBox.baseVal.height * (scale - 1)}px`;
    }

    function fitToScreen() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        const availableWidth = Math.max(1, viewport.clientWidth - 96);
        const availableHeight = Math.max(1, viewport.clientHeight - 96);
        const widthScale = availableWidth / svg.viewBox.baseVal.width;
        const heightScale = availableHeight / svg.viewBox.baseVal.height;
        setScale(Math.min(1.25, Math.max(0.25, Math.min(widthScale, heightScale))));
        const left = parseFloat(svg.style.left) || 0;
        const top = parseFloat(svg.style.top) || 0;
        viewport.scrollLeft = Math.max(0, left + svg.viewBox.baseVal.width * scale / 2 - viewport.clientWidth / 2);
        viewport.scrollTop = Math.max(0, top + svg.viewBox.baseVal.height * scale / 2 - viewport.clientHeight / 2);
    }

    function centerViewportOnCanvas() {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        const left = parseFloat(svg.style.left) || 0;
        const top = parseFloat(svg.style.top) || 0;
        viewport.scrollLeft = Math.max(0, left + svg.viewBox.baseVal.width / 2 - viewport.clientWidth / 2);
        viewport.scrollTop = Math.max(0, top + svg.viewBox.baseVal.height / 2 - viewport.clientHeight / 2);
    }

    function serializeSvg(svg) {
        const clone = svg.cloneNode(true);
        for (const handle of clone.querySelectorAll(".edge-handle")) {
            handle.remove();
        }
        for (const item of clone.querySelectorAll(".dimmed, .focused, .edge-active, .edge-handle-active")) {
            item.classList.remove("dimmed", "focused", "edge-active", "edge-handle-active");
        }
        clone.removeAttribute("style");
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        return new XMLSerializer().serializeToString(clone);
    }

    function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function svgToPngBlob(svg) {
        const serialized = serializeSvg(svg);
        const url = URL.createObjectURL(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" }));
        const image = new Image();
        const box = svg.viewBox.baseVal;
        await new Promise((resolve, reject) => {
            image.onload = resolve;
            image.onerror = reject;
            image.src = url;
        });

        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(box.width * 2);
        canvas.height = Math.ceil(box.height * 2);
        const context = canvas.getContext("2d");
        context.fillStyle = "#fffdf7";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    function nodeBounds(nodeElement) {
        const x = parseFloat(nodeElement.dataset.x);
        const y = parseFloat(nodeElement.dataset.y);
        const w = parseFloat(nodeElement.dataset.width);
        const h = parseFloat(nodeElement.dataset.height);
        return { x, y, w, h };
    }

    function routeForEdge(edge) {
        const svg = getSvg();
        const fromNode = svg.querySelector(`.node[data-node="${CSS.escape(edge.dataset.from)}"]`);
        const toNode = svg.querySelector(`.node[data-node="${CSS.escape(edge.dataset.to)}"]`);
        if (fromNode == null || toNode == null) {
            return null;
        }

        return edgeCenter(
            nodeBounds(fromNode),
            nodeBounds(toNode),
            parseFloat(edge.dataset.lane) || 0,
            parseFloat(edge.dataset.fromOffset) || 0,
            parseFloat(edge.dataset.toOffset) || 0
        );
    }

    function updateEdgeElement(edge) {
        const svg = getSvg();
        const route = routeForEdge(edge);
        if (route == null) {
            return;
        }

        edge.setAttribute("d", route.path);

        const edgeIdSelector = `[data-edge-id="${CSS.escape(edge.dataset.edgeId)}"]`;
        const label = svg.querySelector(`.edge-label${edgeIdSelector}`);
        const labelBg = svg.querySelector(`.edge-label-bg${edgeIdSelector}`);
        const handle = svg.querySelector(`.edge-handle${edgeIdSelector}`);
        if (label != null) {
            label.setAttribute("x", route.labelX);
            label.setAttribute("y", route.labelY - 4);
        }
        if (labelBg != null) {
            const width = parseFloat(labelBg.getAttribute("width"));
            labelBg.setAttribute("x", route.labelX - width / 2);
            labelBg.setAttribute("y", route.labelY - 17);
        }
        if (handle != null) {
            handle.setAttribute("cx", route.labelX);
            handle.setAttribute("cy", route.labelY);
            handle.dataset.lane = edge.dataset.lane;
        }
    }

    function updateEdge(fromId, toId, lane) {
        const svg = getSvg();
        const laneSelector = lane == null ? "" : `[data-lane="${CSS.escape(String(lane))}"]`;
        const edge = svg.querySelector(`.edge[data-from="${CSS.escape(fromId)}"][data-to="${CSS.escape(toId)}"]${laneSelector}`);
        if (edge == null) {
            return;
        }

        updateEdgeElement(edge);
    }

    function updateNodeEdges(nodeId) {
        const svg = getSvg();
        const edges = svg.querySelectorAll(`.edge[data-from="${CSS.escape(nodeId)}"], .edge[data-to="${CSS.escape(nodeId)}"]`);
        for (const edge of edges) {
            updateEdgeElement(edge);
        }
    }

    function svgPoint(clientX, clientY) {
        const svg = getSvg();
        const point = svg.createSVGPoint();
        point.x = clientX;
        point.y = clientY;
        return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function setNodePosition(nodeElement, x, y) {
        nodeElement.dataset.x = x.toFixed(1);
        nodeElement.dataset.y = y.toFixed(1);
        nodeElement.setAttribute("transform", `translate(${x.toFixed(1)},${y.toFixed(1)})`);
        updateNodeEdges(nodeElement.dataset.node);
    }

    function edgeLaneFromPoint(edge, point) {
        const svg = getSvg();
        const fromNode = svg.querySelector(`.node[data-node="${CSS.escape(edge.dataset.from)}"]`);
        const toNode = svg.querySelector(`.node[data-node="${CSS.escape(edge.dataset.to)}"]`);
        if (fromNode == null || toNode == null) {
            return parseFloat(edge.dataset.lane) || 0;
        }

        const from = nodeBounds(fromNode);
        const to = nodeBounds(toNode);
        const fromSide = edgeSide(from, to, true);
        const toSide = edgeSide(from, to, false);
        const fromPoint = portPoint(from, fromSide, parseFloat(edge.dataset.fromOffset) || 0);
        const toPoint = portPoint(to, toSide, parseFloat(edge.dataset.toOffset) || 0);
        const horizontal = fromSide === "left" || fromSide === "right";
        const lane = horizontal
            ? point.x - (fromPoint.x + toPoint.x) / 2
            : point.y - (fromPoint.y + toPoint.y) / 2;

        return Math.max(-320, Math.min(320, lane));
    }

    function setEdgeLane(edge, lane) {
        edge.dataset.lane = lane.toFixed(1);
        const svg = getSvg();
        const selector = `[data-edge-id="${CSS.escape(edge.dataset.edgeId)}"]`;
        for (const item of svg.querySelectorAll(`.edge-label${selector}, .edge-label-bg${selector}, .edge-handle${selector}`)) {
            item.dataset.lane = edge.dataset.lane;
        }
        updateEdgeElement(edge);
    }

    function clearFocus() {
        const svg = getSvg();
        for (const item of svg.querySelectorAll(".focus-hidden, .focused, .dimmed, .edge-active, .edge-handle-active")) {
            item.classList.remove("focus-hidden", "focused", "dimmed", "edge-active", "edge-handle-active");
        }
    }

    function focusNode(nodeId) {
        const svg = getSvg();
        const visible = new Set([nodeId]);
        for (const edge of svg.querySelectorAll(".edge")) {
            if (edge.dataset.from === nodeId) {
                visible.add(edge.dataset.to);
            }
            if (edge.dataset.to === nodeId) {
                visible.add(edge.dataset.from);
            }
        }

        for (const node of svg.querySelectorAll(".node")) {
            node.classList.toggle("focus-hidden", visible.has(node.dataset.node) === false);
            node.classList.toggle("focused", node.dataset.node === nodeId);
        }

        for (const item of svg.querySelectorAll(".edge, .edge-label, .edge-label-bg, .edge-handle")) {
            const isVisible = item.dataset.from === nodeId || item.dataset.to === nodeId;
            item.classList.toggle("focus-hidden", isVisible === false);
        }
    }

    function attachNodeHandlers() {
        const svg = getSvg();
        for (const node of svg.querySelectorAll(".node")) {
            node.addEventListener("mousedown", event => {
                if (event.button !== 0) {
                    return;
                }

                const point = svgPoint(event.clientX, event.clientY);
                draggedNode = node;
                draggedNode.classList.add("dragging-node");
                dragNodeOffsetX = point.x - parseFloat(node.dataset.x);
                dragNodeOffsetY = point.y - parseFloat(node.dataset.y);
                event.preventDefault();
                event.stopPropagation();
            });

            node.addEventListener("dblclick", event => {
                focusNode(node.dataset.node);
                event.stopPropagation();
            });
        }
    }

    function setEdgeHover(edge, isActive) {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        const selector = `[data-edge-id="${CSS.escape(edge.dataset.edgeId)}"]`;
        if (isActive) {
            for (const item of svg.querySelectorAll(".node, .edge, .edge-label, .edge-label-bg, .edge-handle")) {
                item.classList.add("dimmed");
            }
            edge.classList.add("edge-active");
            edge.classList.remove("dimmed");
            for (const item of svg.querySelectorAll(`.edge-label${selector}, .edge-label-bg${selector}, .edge-handle${selector}`)) {
                item.classList.remove("dimmed");
            }
            for (const nodeId of [edge.dataset.from, edge.dataset.to]) {
                const node = svg.querySelector(`.node[data-node="${CSS.escape(nodeId)}"]`);
                if (node != null) {
                    node.classList.remove("dimmed");
                    node.classList.add("focused");
                }
            }
            return;
        }

        for (const item of svg.querySelectorAll(".dimmed, .focused, .edge-active")) {
            item.classList.remove("dimmed", "focused", "edge-active");
        }
    }

    function attachEdgeHandlers() {
        const svg = getSvg();
        for (const edge of svg.querySelectorAll(".edge")) {
            edge.addEventListener("mouseenter", () => setEdgeHover(edge, true));
            edge.addEventListener("mouseleave", () => setEdgeHover(edge, false));
        }
        for (const handle of svg.querySelectorAll(".edge-handle")) {
            handle.addEventListener("mousedown", event => {
                if (event.button !== 0) {
                    return;
                }

                draggedEdge = svg.querySelector(`.edge[data-edge-id="${CSS.escape(handle.dataset.edgeId)}"]`);
                handle.classList.add("edge-handle-active");
                if (draggedEdge != null) {
                    setEdgeHover(draggedEdge, true);
                }
                event.preventDefault();
                event.stopPropagation();
            });
        }
    }

    tabs.innerHTML = Object.keys(diagrams).map(name => {
        const diagram = diagrams[name];
        return `<button class="tab" type="button" data-name="${xml(name)}"><span>${xml(name)}</span><small>${diagram.nodes.length} / ${diagram.edges.length}</small></button>`;
    }).join("");

    tabs.addEventListener("click", event => {
        const tab = event.target.closest(".tab");
        if (tab != null) {
            showDiagram(tab.dataset.name);
        }
    });

    document.addEventListener("click", async event => {
        const button = event.target.closest("button[data-action]");
        if (button == null) {
            return;
        }

        const action = button.dataset.action;
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        if (action === "zoom-in") {
            setScale(scale + 0.15);
            return;
        }
        if (action === "zoom-out") {
            setScale(scale - 0.15);
            return;
        }
        if (action === "zoom-reset") {
            setScale(1);
            return;
        }
        if (action === "fit") {
            fitToScreen();
            return;
        }
        if (action === "clear-focus") {
            clearFocus();
            return;
        }

        const serialized = serializeSvg(svg);
        const fileName = activeName.replace(/[^A-Za-z0-9_]+/g, "_");
        if (action === "open-svg") {
            window.open(URL.createObjectURL(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" })), "_blank");
            return;
        }
        if (action === "download-svg") {
            downloadBlob(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" }), fileName + ".svg");
            return;
        }
        if (action === "download-png") {
            downloadBlob(await svgToPngBlob(svg), fileName + ".png");
            return;
        }
        if (action === "copy-svg") {
            try {
                await navigator.clipboard.writeText(serialized);
                showStatus("SVG copied");
            } catch {
                downloadBlob(new Blob([serialized], { type: "image/svg+xml;charset=utf-8" }), fileName + ".svg");
                showStatus("Clipboard blocked; SVG downloaded");
            }
        }
    });

    viewport.addEventListener("mousedown", event => {
        if (event.button !== 0 || event.target.closest(".node") != null) {
            return;
        }
        isPanning = true;
        panStartX = event.clientX;
        panStartY = event.clientY;
        panStartLeft = viewport.scrollLeft;
        panStartTop = viewport.scrollTop;
        viewport.classList.add("dragging");
        event.preventDefault();
    });

    window.addEventListener("mousemove", event => {
        if (draggedEdge != null) {
            const point = svgPoint(event.clientX, event.clientY);
            setEdgeLane(draggedEdge, edgeLaneFromPoint(draggedEdge, point));
            return;
        }
        if (draggedNode != null) {
            const point = svgPoint(event.clientX, event.clientY);
            setNodePosition(draggedNode, Math.max(0, point.x - dragNodeOffsetX), Math.max(0, point.y - dragNodeOffsetY));
            return;
        }
        if (isPanning === false) {
            return;
        }
        viewport.scrollLeft = panStartLeft - (event.clientX - panStartX);
        viewport.scrollTop = panStartTop - (event.clientY - panStartY);
    });

    window.addEventListener("mouseup", () => {
        if (draggedEdge != null) {
            setEdgeHover(draggedEdge, false);
            const svg = getSvg();
            if (svg != null) {
                for (const handle of svg.querySelectorAll(".edge-handle-active")) {
                    handle.classList.remove("edge-handle-active");
                }
            }
            draggedEdge = null;
        }
        if (draggedNode != null) {
            draggedNode.classList.remove("dragging-node");
            draggedNode = null;
        }
        if (isPanning) {
            isPanning = false;
            viewport.classList.remove("dragging");
        }
    });

    viewport.addEventListener("wheel", event => {
        const svg = getSvg();
        if (svg == null) {
            return;
        }

        event.preventDefault();
        const oldScale = scale;
        const nextScale = Math.max(0.25, Math.min(4, oldScale + (event.deltaY < 0 ? 0.12 : -0.12)));
        const rect = viewport.getBoundingClientRect();
        const svgLeft = parseFloat(svg.style.left) || 0;
        const svgTop = parseFloat(svg.style.top) || 0;
        const cursorStageX = event.clientX - rect.left + viewport.scrollLeft;
        const cursorStageY = event.clientY - rect.top + viewport.scrollTop;
        const worldX = (cursorStageX - svgLeft) / oldScale;
        const worldY = (cursorStageY - svgTop) / oldScale;
        setScale(nextScale);
        viewport.scrollLeft = svgLeft + worldX * nextScale - (event.clientX - rect.left);
        viewport.scrollTop = svgTop + worldY * nextScale - (event.clientY - rect.top);
    }, { passive: false });

    showDiagram(activeName);
</script>
</body>
</html>
